<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Hacksman</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; background: #111827; color: #f3f4f6; min-height: 100vh; display: flex; flex-direction: column; }
      .container { max-width: 1200px; margin: 0 auto; padding: 1rem; display: grid; gap: 1rem; grid-template-columns: 360px 1fr; }
      .card { background: #1f2937; border-radius: 8px; padding: 1rem; }
      .field { display: grid; gap: 0.35rem; margin-bottom: 0.7rem; }
      label { font-size: 0.9rem; color: #d1d5db; }
      .label-with-help { display: inline-flex; align-items: center; gap: 0.4rem; }
      .help-tip {
        width: 1.1rem;
        height: 1.1rem;
        border-radius: 9999px;
        border: 1px solid #9ca3af;
        background: #374151;
        color: #f3f4f6;
        font-size: 0.75rem;
        line-height: 1;
        padding: 0;
        cursor: pointer;
      }
      .floating-tooltip {
        position: fixed;
        z-index: 9999;
        max-width: 320px;
        background: #0f172a;
        border: 1px solid #4b5563;
        border-radius: 6px;
        padding: 0.55rem 0.65rem;
        color: #d1d5db;
        font-size: 0.8rem;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
      }
      input, select, textarea, button { border-radius: 6px; border: 1px solid #4b5563; background: #111827; color: #f3f4f6; padding: 0.5rem; }
      textarea { min-height: 100px; resize: vertical; }
      button { cursor: pointer; background: #2563eb; border-color: #2563eb; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
      .button-row { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; }
      #topic-buttons { display: flex; flex-wrap: wrap; gap: 0.5rem; }
      #topic-buttons button { background: #374151; border-color: #4b5563; }
      #rag-collections { display: grid; gap: 0.25rem; margin-bottom: 0.7rem; }
      #response, #history, #diagnostics, #metrics { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.9rem; }
      #performance-chart { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.9rem; color: #d1d5db; }
      .history-item { border: 1px solid #374151; border-radius: 8px; padding: 0.75rem; margin-bottom: 0.75rem; background: #111827; }
      .response-panel {
        border: 1px solid #3b82f6;
        border-radius: 10px;
        background: linear-gradient(180deg, rgba(30, 58, 138, 0.35) 0%, rgba(17, 24, 39, 0.95) 100%);
        box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.35), 0 10px 22px rgba(2, 6, 23, 0.4);
        padding: 0.8rem;
        margin-bottom: 0.6rem;
      }
      .response-header {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        margin-bottom: 0.45rem;
      }
      .response-title {
        font-size: 0.8rem;
        color: #bfdbfe;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        font-weight: 700;
      }
      .response-loading {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 0.7rem;
        font-size: 1rem;
        font-weight: 600;
        color: #dbeafe;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        background: rgba(15, 23, 42, 0.72);
        border-radius: 8px;
        z-index: 2;
      }
      .response-loading[hidden] { display: none !important; }
      .spinner {
        width: 2.25rem;
        height: 2.25rem;
        border: 4px solid rgba(191, 219, 254, 0.25);
        border-top-color: #60a5fa;
        border-radius: 9999px;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      #response {
        position: relative;
        min-height: 3.5rem;
        border: 1px solid #1e3a8a;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.6);
        padding: 0.75rem;
        overflow: hidden;
      }
      .response-panel.fresh-response {
        animation: responsePulse 1.6s ease-out;
      }
      @keyframes responsePulse {
        0% {
          box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.35), 0 10px 22px rgba(2, 6, 23, 0.4);
        }
        25% {
          box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.8), 0 0 26px rgba(59, 130, 246, 0.65);
        }
        100% {
          box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.35), 0 10px 22px rgba(2, 6, 23, 0.4);
        }
      }
      .tab-row {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 0.8rem;
      }
      .top-tab {
        background: #1f2937;
        border-color: #4b5563;
        color: #d1d5db;
        font-weight: 600;
      }
      .top-tab.active {
        background: #1d4ed8;
        border-color: #1d4ed8;
        color: #eff6ff;
      }
      .tab-panel[hidden] { display: none !important; }
      .feedback-row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin-bottom: 0.5rem; }
      .feedback-row button { min-width: 2.25rem; }
      .feedback-row button.secondary { background: #374151; border-color: #4b5563; }
      .feedback-row button.selected { background: #1d4ed8; border-color: #1d4ed8; }
      .feedback-row textarea { min-height: 2.5rem; flex: 1 1 260px; }
      .history-meta { color: #9ca3af; font-size: 0.8rem; margin-bottom: 0.4rem; }
      .history-qa { margin: 0; white-space: pre-wrap; }
      .history-prompt-toggle {
        margin-top: 0.5rem;
        background: #1f2937;
        border-color: #4b5563;
        color: #d1d5db;
        font-size: 0.8rem;
        padding: 0.35rem 0.6rem;
      }
      .history-prompt {
        margin-top: 0.45rem;
        padding: 0.6rem;
        border: 1px dashed #374151;
        border-radius: 6px;
        background: #0f172a;
        white-space: pre-wrap;
        color: #cbd5e1;
        font-size: 0.82rem;
      }
      .muted { color: #9ca3af; font-size: 0.85rem; }
      .footer { margin-top: auto; border-top: 1px solid #374151; padding: 0.75rem 1rem; color: #9ca3af; font-size: 0.85rem; text-align: center; }
      .footer a { color: #93c5fd; text-decoration: none; }
      .footer a:hover { text-decoration: underline; }
      @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="card">
        <h2>Chat Hacksman</h2>
        <div class="field">
          <label for="provider" class="label-with-help">
            Provider
            <button class="help-tip" data-help="Choose API flavor: ollama for Ollama servers, llama.cpp for OpenAI-compatible llama.cpp servers." type="button">?</button>
          </label>
          <select id="provider">
            <option value="ollama">Ollama</option>
            <option value="llama_cpp">llama.cpp</option>
          </select>
        </div>
        <div class="field">
          <label for="llm-base-url" class="label-with-help">
            LLM Base URL
            <button class="help-tip" data-help="Base endpoint for your model server, for example http://localhost:11434." type="button">?</button>
          </label>
          <select id="llm-base-url"></select>
          <input id="llm-base-url-custom" placeholder="add new LLM base URL (optional)" />
        </div>
        <div class="field">
          <label for="model-select" class="label-with-help">
            Model
            <button class="help-tip" data-help="Select an installed Ollama model. For llama.cpp, use the model text field." type="button">?</button>
          </label>
          <select id="model-select"></select>
          <input id="model-input" placeholder="model name (llama.cpp)" hidden />
          <input id="pull-model-name" placeholder="ollama model to pull (e.g. llama3.2:latest)" hidden />
          <button id="pull-model" type="button" hidden>Pull Model</button>
          <button id="refresh-models" type="button">Refresh Models</button>
        </div>
        <div class="field">
          <label for="system-prompt" class="label-with-help">
            System Prompt (remembered)
            <button class="help-tip" data-help="Persistent instruction prepended to every request to control tone, scope, and behavior." type="button">?</button>
          </label>
          <textarea id="system-prompt"></textarea>
        </div>

        <div class="row">
          <div class="field">
            <label for="temperature" class="label-with-help">
              Temperature
              <button class="help-tip" data-help="Controls randomness. Lower is more deterministic; higher is more creative." type="button">?</button>
            </label>
            <input id="temperature" type="number" step="0.01" min="0" max="2" />
          </div>
          <div class="field">
            <label for="top-p" class="label-with-help">
              Top P
              <button class="help-tip" data-help="Nucleus sampling. Lower values restrict choices to higher-probability tokens." type="button">?</button>
            </label>
            <input id="top-p" type="number" step="0.01" min="0" max="1" />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="max-tokens" class="label-with-help">
              Max Tokens
              <button class="help-tip" data-help="Maximum number of tokens the model may generate in its answer." type="button">?</button>
            </label>
            <input id="max-tokens" type="number" min="1" max="4096" />
          </div>
          <div class="field">
            <label for="repeat-penalty" class="label-with-help">
              Repeat Penalty
              <button class="help-tip" data-help="Penalizes repeated tokens. Increase to reduce repetition loops." type="button">?</button>
            </label>
            <input id="repeat-penalty" type="number" step="0.01" min="0" max="3" />
          </div>
        </div>
        <div class="row">
          <div class="field" id="num-ctx-field">
            <label for="num-ctx" class="label-with-help">
              Ollama Num Context
              <button class="help-tip" data-help="Ollama context window size. Larger values use more memory and may be slower." type="button">?</button>
            </label>
            <input id="num-ctx" type="number" min="256" max="32768" />
          </div>
          <div class="field" id="seed-field">
            <label for="seed" class="label-with-help">
              llama.cpp Seed (optional)
              <button class="help-tip" data-help="Random seed for reproducible sampling. Same seed + settings tends to produce similar outputs." type="button">?</button>
            </label>
            <input id="seed" type="number" />
          </div>
        </div>
        <div class="row">
          <button id="save-settings">Save Settings</button>
          <button id="refresh-topics" type="button">Refresh Topics</button>
        </div>
        <h4 class="label-with-help">
          Qdrant Collections
          <button class="help-tip" data-help="Choose which Qdrant collections can be used during retrieval." type="button">?</button>
        </h4>
        <div id="rag-collections" class="muted"></div>
        <p class="muted" id="status"></p>
      </section>

      <section class="card">
        <div class="tab-row">
          <button class="top-tab active" type="button" data-tab-target="chat">Chat</button>
          <button class="top-tab" type="button" data-tab-target="feedback">Feedback</button>
          <button class="top-tab" type="button" data-tab-target="history">History</button>
        </div>

        <div class="tab-panel" data-tab-panel="chat">
          <h3>Interest & Training Topic Buttons</h3>
          <div id="topic-buttons"></div>
          <hr />
          <div class="field">
            <label for="question" class="label-with-help">
              Question
              <button class="help-tip" data-help="Your prompt to the assistant. Topic buttons fill and send this field." type="button">?</button>
            </label>
            <textarea id="question"></textarea>
          </div>
          <div class="row">
            <button id="ask">Ask</button>
            <label class="muted label-with-help">
              <input id="use-rag" type="checkbox" checked /> Use RAG
              <button class="help-tip" data-help="When enabled, relevant chunks from selected Qdrant collections are injected into context." type="button">?</button>
            </label>
          </div>
          <h4>Recorded Chats</h4>
          <p class="muted">Chats are recorded by default and appear in History.</p>
          <div class="feedback-row">
            <label class="muted label-with-help">
              <input id="temporary-chat" type="checkbox" /> Temporary Chat (do not save)
              <button class="help-tip" data-help="Process this chat normally but do not persist it to history." type="button">?</button>
            </label>
          </div>
          <h4>Response</h4>
          <div class="response-panel" id="response-panel">
            <div class="response-header">
              <span class="response-title">Latest Reply</span>
            </div>
            <div id="response">
              <div id="response-loading" class="response-loading" hidden>
                <span class="spinner" aria-hidden="true"></span>
                <span>Generating response...</span>
              </div>
            </div>
          </div>
          <div class="feedback-row">
            <button id="feedback-up" class="secondary" type="button" title="Thumbs up">👍</button>
            <button id="feedback-down" class="secondary" type="button" title="Thumbs down">👎</button>
            <textarea id="feedback-text" placeholder="Optional feedback text..."></textarea>
            <button id="submit-feedback" type="button">Save Feedback</button>
          </div>
          <p id="feedback-status" class="muted"></p>
          <div class="button-row">
            <h4>Performance</h4>
            <button id="clear-performance-trend" type="button">Clear Trend</button>
          </div>
          <div id="metrics"></div>
          <h4>Performance Trend (last 20 queries)</h4>
          <div id="performance-chart"></div>
          <div class="row">
            <h4>Diagnostics</h4>
            <button id="copy-diagnostics" type="button">Copy Diagnostics</button>
          </div>
          <div id="diagnostics"></div>
        </div>

        <div class="tab-panel" data-tab-panel="feedback" hidden>
          <div class="button-row">
            <h4>Feedback</h4>
            <button id="refresh-feedback" type="button">Refresh Feedback</button>
          </div>
          <div id="feedback-list"></div>
        </div>

        <div class="tab-panel" data-tab-panel="history" hidden>
          <div class="button-row">
            <h4>History</h4>
            <button id="delete-latest-history" type="button">Delete Latest</button>
            <button id="clear-history" type="button">Clear History</button>
          </div>
          <div id="history"></div>
        </div>
      </section>
    </div>
    <footer class="footer">
      <span id="footer-meta">Chat Hacksman</span>
    </footer>
    <script src="/static/app.js?v=0.4.4-2"></script>
  </body>
  </html>
